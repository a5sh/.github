<svg width="1000" height="280" viewBox="0 0 1000 280" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="techGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#7c6af7" stop-opacity="0.15"/>
    <stop offset="100%" stop-color="#5a4fa5" stop-opacity="0.08"/>
  </linearGradient>
  
  <filter id="techShadow">
    <feGaussianBlur stdDeviation="1.5"/>
    <feOffset dx="0" dy="2"/>
    <feComponentTransfer>
      <feFuncA type="linear" slope="0.2"/>
    </feComponentTransfer>
    <feMerge>
      <feMergeNode in="offsetblur"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>
  
  <clipPath id="techClip">
    <rect width="1000" height="280" rx="16"/>
  </clipPath>
  
  <style>
    @keyframes techGlow {
      0%, 100% { filter: drop-shadow(0 0 4px rgba(124, 106, 247, 0.3)); }
      50% { filter: drop-shadow(0 0 10px rgba(157, 143, 245, 0.6)); }
    }
    
    @keyframes badgeHover {
      0%, 100% { filter: drop-shadow(0 0 0px rgba(157, 143, 245, 0.3)); }
      50% { filter: drop-shadow(0 0 8px rgba(157, 143, 245, 0.8)); }
    }
    
    .tech-badge:hover {
      filter: drop-shadow(0 0 12px rgba(157, 143, 245, 0.9)) !important;
    }
  </style>
</defs>

<!-- Background -->
<rect width="1000" height="280" rx="16" fill="#0c0c0f"/>
<rect width="998" height="278" x="1" y="1" rx="15" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="2"/>

<g clip-path="url(#techClip)">
  <!-- Title -->
  <text x="50" y="50" font-family="'Fira Code', monospace" font-size="24" font-weight="700" fill="#ededed">
    TECH STACK
  </text>
  
  <line x1="50" y1="62" x2="220" y2="62" stroke="#7c6af7" stroke-width="2" opacity="0.7"/>
  
  <!-- Languages & Frontend -->
  <text x="50" y="105" font-family="monospace" font-size="11" fill="#7c6af7" font-weight="600" letter-spacing="1">
    LANGUAGES
  </text>
  
  <g class="tech-badge" style="animation: badgeHover 2.5s ease-in-out infinite;">
    <rect x="50" y="115" width="70" height="32" rx="6" fill="rgba(157, 143, 245, 0.15)" stroke="rgba(157, 143, 245, 0.4)" stroke-width="1"/>
    <text x="58" y="137" font-family="monospace" font-size="11" font-weight="600" fill="#9d8ff5">JavaScript</text>
  </g>
  
  <g class="tech-badge" style="animation: badgeHover 2.5s ease-in-out infinite; animation-delay: 0.2s;">
