<svg width="1000" height="340" viewBox="0 0 1000 340" xmlns="http://www.w3.org/2000/svg">
<defs>
  <style>
    @keyframes cardPop { 0% { opacity: 0; transform: scale(0.85); } 100% { opacity: 1; transform: scale(1); } }
    @keyframes shimmer { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
    @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-8px); } }
    
    .card { animation: cardPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
    .card1 { animation-delay: 0.1s; }
    .card2 { animation-delay: 0.15s; }
    .card3 { animation-delay: 0.2s; }
    .card4 { animation-delay: 0.25s; }
    .card5 { animation-delay: 0.3s; }
    .card6 { animation-delay: 0.35s; }
    .card7 { animation-delay: 0.4s; }
    .card8 { animation-delay: 0.45s; }
  </style>
  <clipPath id="tc"><rect width="1000" height="340" rx="12"/></clipPath>
  <linearGradient id="tbg" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#ffffff"/>
    <stop offset="100%" stop-color="#f8fafc"/>
  </linearGradient>
</defs>

<rect width="1000" height="340" rx="12" fill="#ffffff"/>
<rect width="998" height="338" x="1" y="1" rx="11" fill="none" stroke="#e2e8f0" stroke-width="1.5"/>

<g clip-path="url(#tc)">
  <!-- Background -->
  <rect width="1000" height="340" fill="url(#tbg)"/>
  
  <!-- Animated accent circles -->
  <circle cx="950" cy="30" r="110" fill="#8b5cf6" opacity="0.05" style="animation: float 9s ease-in-out infinite;"/>
  <circle cx="80" cy="300" r="120" fill="#06b6d4" opacity="0.04" style="animation: float 10s ease-in-out 1s infinite;"/>
  
  <!-- Title -->
  <text x="50" y="45" font-family="'Space Grotesk', sans-serif" font-size="28" font-weight="800" fill="#1e1b4b" letter-spacing="-0.5">
    Tech Stack
  </text>
  
  <!-- Grid of tech cards -->
  <!-- Row 1 -->
  <g class="card card1">
    <rect x="50" y="70" width="110" height="110" rx="8" fill="#8b5cf6" opacity="0.12" stroke="#8b5cf6" stroke-width="1.5"/>
    <text x="65" y="105" font-family="'Inter', sans-serif" font-size="12" font-weight="700" fill="#6d28d9">React</text>
    <text x="65" y="122" font-family="'Inter', sans-serif" font-size="9" fill="#a78bfa">Frontend</text>
    <circle cx="155" cy="120" r="2.5" fill="#8b5cf6" style="animation: shimmer 2s ease-in-out infinite;"/>
  </g>
  
  <g class="card card2">
    <rect x="180" y="70" width="110" height="110" rx="8" fill="#06b6d4" opacity="0.12" stroke="#06b6d4" stroke-width="1.5"/>
    <text x="195" y="105" font-family="'Inter', sans-serif" font-size="12" font-weight="700" fill="#0369a1">TypeScript</text>
    <text x="195" y="122" font-family="'Inter', sans-serif" font-size="9" fill="#06b6d4">Types</text>
    <circle cx="285" cy="120" r="2.5" fill="#06b6d4" style="animation: shimmer 2.2s ease-in-out infinite;"/>
  </g>
  
  <g class="card card3">
    <rect x="310" y="70" width="110" height="110" rx="8" fill="#ec4899" opacity="0.12" stroke="#ec4899" stroke-width="1.5"/>
    <text x="325" y="105" font-family="'Inter', sans-serif" font-size="12" font-weight="700" fill="#be185d">Next.js</text>
    <text x="325" y="122" font-family="'Inter', sans-serif" font-size="9" fill="#ec4899">Framework</text>
    <circle cx="415" cy="120" r="2.5" fill="#ec4899" style="animation: shimmer 2.4s ease-in-out infinite;"/>
  </g>
  
  <g class="card card4">
    <rect x="440" y="70" width="110" height="110" rx="8" fill="#fbbf24" opacity="0.12" stroke="#fbbf24" stroke-width="1.5"/>
    <text x="455" y="105" font-family="'Inter', sans-serif" font-size="12" font-weight="700" fill="#b45309">Canvas</text>
    <text x="455" y="122" font-family="'Inter', sans-serif" font-size="9" fill="#f59e0b">Graphics</text>
    <circle cx="545" cy="120" r="2.5" fill="#fbbf24" style="animation: shimmer 2.6s ease-in-out infinite;"/>
  </g>
  
  <g class="card card5">
    <rect x="570" y="70" width="110" height="110" rx="8" fill="#84cc16" opacity="0.12" stroke="#84cc16" stroke-width="1.5"/>
    <text x="585" y="105" font-family="'Inter', sans-serif" font-size="12" font-weight="700" fill="#65a30d">Node.js</text>
    <text x="585" y="122" font-family="'Inter', sans-serif" font-size="9" fill="#a3e635">Backend</text>
    <circle cx="675" cy="120" r="2.5" fill="#84cc16" style="animation: shimmer 2.8s ease-in-out infinite;"/>
  </g>
  
  <g class="card card6">
    <rect x="700" y="70" width="110" height="110" rx="8" fill="#10b981" opacity="0.12" stroke="#10b981" stroke-width="1.5"/>
    <text x="715" y="105" font-family="'Inter', sans-serif" font-size="12" font-weight="700" fill="#065f46">PostgreSQL</text>
    <text x="715" y="122" font-family="'Inter', sans-serif" font-size="9" fill="#10b981">Database</text>
    <circle cx="805" cy="120" r="2.5" fill="#10b981" style="animation: shimmer 3s ease-in-out infinite;"/>
  </g>
  
  <g class="card card7">
    <rect x="830" y="70" width="110" height="110" rx="8" fill="#6366f1" opacity="0.12" stroke="#6366f1" stroke-width="1.5"/>
    <text x="845" y="105" font-family="'Inter', sans-serif" font-size="12" font-weight="700" fill="#3730a3">Docker</text>
    <text x="845" y="122" font-family="'Inter', sans-serif" font-size="9" fill="#818cf8">DevOps</text>
    <circle cx="935" cy="120" r="2.5" fill="#6366f1" style="animation: shimmer 3.2s ease-in-out infinite;"/>
  </g>
  
  <!-- Row 2 - Tools -->
  <g class="card card8">
    <rect x="50" y="200" width="890" height="110" rx="8" fill="#a78bfa" opacity="0.08" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="70" y="235" font-family="'Space Grotesk', sans-serif" font-size="14" font-weight="700" fill="#5b21b6">Tools and More</text>
    <text x="70" y="260" font-family="'JetBrains Mono', monospace" font-size="10" fill="#7c3aed" letter-spacing="0.1">
      Figma • Framer • GraphQL • Git • CI/CD • Design Systems • GSAP • Storybook • Python • AWS
    </text>
    <text x="70" y="280" font-family="'JetBrains Mono', monospace" font-size="10" fill="#a78bfa" letter-spacing="0.1">
      MongoDB • Redis • API Design • Performance Optimization • UX/UI • Accessibility
    </text>
  </g>
</g>
</svg>