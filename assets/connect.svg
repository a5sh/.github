<svg width="1000" height="180" viewBox="0 0 1000 180" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="ctaGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#9d8ff5" stop-opacity="0.15"/>
    <stop offset="100%" stop-color="#7c6af7" stop-opacity="0.08"/>
  </linearGradient>
  
  <filter id="ctaGlow">
    <feGaussianBlur stdDeviation="2"/>
    <feOffset dx="0" dy="3" result="offsetblur"/>
    <feComponentTransfer>
      <feFuncA type="linear" slope="0.2"/>
    </feComponentTransfer>
    <feMerge>
      <feMergeNode in="offsetblur"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>
  
  <clipPath id="ctaClip">
    <rect width="1000" height="180" rx="16"/>
  </clipPath>
  
  <style>
    @keyframes linkPulse {
      0%, 100% { filter: drop-shadow(0 0 0px rgba(157, 143, 245, 0.3)); }
      50% { filter: drop-shadow(0 0 8px rgba(157, 143, 245, 0.8)); }
    }
    
    .cta-link:hover {
      filter: drop-shadow(0 0 12px rgba(157, 143, 245, 1)) !important;
    }
    
    .cta-link {
      cursor: pointer;
      transition: all 0.3s ease;
    }
  </style>
</defs>

<!-- Background -->
<rect width="1000" height="180" rx="16" fill="#0c0c0f"/>
<rect width="998" height="178" x="1" y="1" rx="15" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="2"/>

<g clip-path="url(#ctaClip)">
  <!-- Background glow -->
  <circle cx="150" cy="90" r="120" fill="#7c6af7" opacity="0.08" filter="url(#ctaGlow)"/>
  <circle cx="850" cy="90" r="100" fill="#9d8ff5" opacity="0.06" filter="url(#ctaGlow)"/>
  
  <!-- Main text -->
  <text x="50" y="65" font-family="'Fira Code', monospace" font-size="28" font-weight="700" fill="#ededed">
    Let's Build Something
  </text>
  
  <text x="50" y="95" font-family="'Fira Code', monospace" font-size="28" font-weight="700">
    <tspan fill="#9d8ff5">Extraordinary</tspan>
  </text>
  
  <!-- Accent line -->
  <line x1="50" y1="110" x2="450" y2="110" stroke="#7c6af7" stroke-width="2" opacity="0.5"/>
  
  <!-- GitHub Link -->
  <g class="cta-link" style="animation: linkPulse 3s ease-in-out infinite;">
    <circle cx="600" cy="60" r="28" fill="rgba(124, 106, 247, 0.15)" stroke="rgba(157, 143, 245, 0.4)" stroke-width="2"/>
    <text x="590" y="68" font-family="monospace" font-size="14" font-weight="700" fill="#9d8ff5">GH</text>
  </g>
  
  <text x="645" y="60" font-family="monospace" font-size="12" font-weight="600" fill="#9d8ff5">
    github.com/opaayush
  </text>
  
  <text x="645" y="78" font-family="monospace" font-size="10" fill="#4a4a5a">
    Code & Projects
  </text>
  
  <!-- Email Link -->
  <g class="cta-link" style="animation: linkPulse 3s ease-in-out infinite; animation-delay: 0.3s;">
    <circle cx="600" cy="125" r="28" fill="rgba(196, 181, 253, 0.15)" stroke="rgba(196, 181, 253, 0.4)" stroke-width="2"/>
    <text x="585" y="133" font-family="monospace" font-size="14" font-weight="700" fill="#c4b5fd">@</text>
  </g>
  
  <text x="645" y="125" font-family="monospace" font-size="12" font-weight="600" fill="#c4b5fd">
    hello@opaayush.dev
  </text>
  
  <text x="645" y="143" font-family="monospace" font-size="10" fill="#4a4a5a">
    Get in Touch
  </text>
  
  <!-- Status indicator -->
  <g>
    <circle cx="900" cy="55" r="12" fill="rgba(124, 106, 247, 0.2)" stroke="rgba(157, 143, 245, 0.4)" stroke-width="2"/>
    <circle cx="900" cy="55" r="7" fill="#7c6af7">
      <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text x="820" y="80" font-family="monospace" font-size="11" fill="#7c6af7" font-weight="600" letter-spacing="0.5">
      OPEN TO OPPORTUNITIES
    </text>
  </g>
  
  <!-- Divider -->
  <line x1="50" y1="160" x2="950" y2="160" stroke="rgba(124, 106, 247, 0.1)" stroke-width="1"/>

</g>

</svg>