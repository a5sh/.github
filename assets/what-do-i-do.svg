<svg width="1000" height="200" viewBox="0 0 1000 200" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="whatGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#9d8ff5" stop-opacity="0.2"/>
    <stop offset="100%" stop-color="#7c6af7" stop-opacity="0.1"/>
  </linearGradient>
  
  <linearGradient id="whatGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#7c6af7" stop-opacity="0.2"/>
    <stop offset="100%" stop-color="#5a4fa5" stop-opacity="0.1"/>
  </linearGradient>
  
  <linearGradient id="whatGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#c4b5fd" stop-opacity="0.2"/>
    <stop offset="100%" stop-color="#7c6af7" stop-opacity="0.1"/>
  </linearGradient>
  
  <filter id="whatGlow">
    <feGaussianBlur stdDeviation="2"/>
    <feOffset dx="0" dy="4" result="offsetblur"/>
    <feComponentTransfer>
      <feFuncA type="linear" slope="0.2"/>
    </feComponentTransfer>
    <feMerge>
      <feMergeNode in="offsetblur"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>
  
  <clipPath id="whatClip">
    <rect width="1000" height="200" rx="16"/>
  </clipPath>
  
  <style>
    @keyframes cardHover {
      0%, 100% { filter: drop-shadow(0 10px 20px rgba(157, 143, 245, 0.15)); }
      50% { filter: drop-shadow(0 15px 30px rgba(157, 143, 245, 0.3)); }
    }
    
    @keyframes dotPulse {
      0%, 100% { r: 5; opacity: 0.6; }
      50% { r: 7; opacity: 1; }
    }
    
    /* Hover effects */
    .what-card:hover {
      filter: drop-shadow(0 12px 30px rgba(157, 143, 245, 0.4)) !important;
    }
  </style>
</defs>

<!-- Background -->
<rect width="1000" height="200" rx="16" fill="#0c0c0f"/>
<rect width="998" height="198" x="1" y="1" rx="15" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="2"/>

<g clip-path="url(#whatClip)">
  <!-- Card 1: Frontend -->
  <g class="what-card" style="animation: cardHover 3s ease-in-out infinite;">
    <rect x="40" y="30" width="280" height="140" rx="10" fill="url(#whatGrad1)" stroke="rgba(157, 143, 245, 0.3)" stroke-width="1.5" filter="url(#whatGlow)"/>
    
    <circle cx="65" cy="55" r="5" fill="#9d8ff5" opacity="0.8">
      <animate attributeName="r" values="5;7;5" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    
    <text x="80" y="60" font-family="'Fira Code', monospace" font-size="16" font-weight="700" fill="#9d8ff5">
      FRONTEND
    </text>
    
    <text x="50" y="90" font-family="monospace" font-size="11" fill="#4a4a5a" width="260">
      React • TypeScript • Animation
    </text>
    <text x="50" y="110" font-family="monospace" font-size="11" fill="#4a4a5a" width="260">
      Interactive • Performance-First
    </text>
    <text x="50" y="130" font-family="monospace" font-size="10" fill="#272730">
      Canvas • GSAP • Tailwind
    </text>
  </g>
  
  <!-- Card 2: Backend -->
  <g class="what-card" style="animation: cardHover 3s ease-in-out infinite; animation-delay: 0.5s;">
    <rect x="360" y="30" width="280" height="140" rx="10" fill="url(#whatGrad2)" stroke="rgba(124, 106, 247, 0.3)" stroke-width="1.5" filter="url(#whatGlow)"/>
    
    <circle cx="385" cy="55" r="5" fill="#7c6af7" opacity="0.8">
      <animate attributeName="r" values="5;7;5" dur="2.7s" repeatCount="indefinite"/>
    </circle>
    
    <text x="400" y="60" font-family="'Fira Code', monospace" font-size="16" font-weight="700" fill="#7c6af7">
      BACKEND
    </text>
    
    <text x="370" y="90" font-family="monospace" font-size="11" fill="#4a4a5a" width="260">
      Node.js • Python • Scalable
    </text>
    <text x="370" y="110" font-family="monospace" font-size="11" fill="#4a4a5a" width="260">
      APIs • Databases • Optimization
    </text>
    <text x="370" y="130" font-family="monospace" font-size="10" fill="#272730">
      Express • FastAPI • PostgreSQL
    </text>
  </g>
  
  <!-- Card 3: Creative -->
  <g class="what-card" style="animation: cardHover 3s ease-in-out infinite; animation-delay: 1s;">
    <rect x="680" y="30" width="280" height="140" rx="10" fill="url(#whatGrad3)" stroke="rgba(196, 181, 253, 0.3)" stroke-width="1.5" filter="url(#whatGlow)"/>
    
    <circle cx="705" cy="55" r="5" fill="#c4b5fd" opacity="0.8">
      <animate attributeName="r" values="5;7;5" dur="2.9s" repeatCount="indefinite"/>
    </circle>
    
    <text x="720" y="60" font-family="'Fira Code', monospace" font-size="16" font-weight="700" fill="#c4b5fd">
      DESIGN
    </text>
    
    <text x="690" y="90" font-family="monospace" font-size="11" fill="#4a4a5a" width="260">
      UI/UX • Figma • Prototypes
    </text>
    <text x="690" y="110" font-family="monospace" font-size="11" fill="#4a4a5a" width="260">
      Animations • User Experience
    </text>
    <text x="690" y="130" font-family="monospace" font-size="10" fill="#272730">
      Micro-interactions • Design Systems
    </text>
  </g>

</g>

</svg>