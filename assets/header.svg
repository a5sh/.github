<svg width="1000" height="280" viewBox="0 0 1000 280" xmlns="http://www.w3.org/2000/svg">
<defs>
  <style>
    @keyframes charReveal { 0% { clip-path: inset(0 100% 0 0); } 100% { clip-path: inset(0 0 0 0); } }
    @keyframes glow { 0%, 100% { opacity: 0.08; } 50% { opacity: 0.2; } }
    @keyframes drift { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(12px); } }
    @keyframes pulse { 0%, 100% { r: 4; } 50% { r: 5.5; } }
    
    .c1 { animation: charReveal 0.4s ease-out 0.05s both; }
    .c2 { animation: charReveal 0.4s ease-out 0.1s both; }
    .c3 { animation: charReveal 0.4s ease-out 0.15s both; }
    .c4 { animation: charReveal 0.4s ease-out 0.2s both; }
    .c5 { animation: charReveal 0.4s ease-out 0.25s both; }
    .c6 { animation: charReveal 0.4s ease-out 0.3s both; }
    .txt { animation: charReveal 0.5s ease-out 0.45s both; }
  </style>
  <clipPath id="hc"><rect width="1000" height="280" rx="12"/></clipPath>
  <linearGradient id="hbg" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#1e1b4b"/>
    <stop offset="100%" stop-color="#0f172a"/>
  </linearGradient>
</defs>

<rect width="1000" height="280" rx="12" fill="#0f172a"/>
<rect width="998" height="278" x="1" y="1" rx="11" fill="none" stroke="#334155" stroke-width="1.5"/>

<g clip-path="url(#hc)">
  <!-- Base gradient -->
  <rect width="1000" height="280" fill="url(#hbg)"/>
  
  <!-- Animated floating circles -->
  <circle cx="850" cy="50" r="120" fill="#a78bfa" style="animation: glow 5s ease-in-out infinite;"/>
  <circle cx="150" cy="230" r="110" fill="#06b6d4" style="animation: glow 5.5s ease-in-out 0.5s infinite;"/>
  <circle cx="200" cy="80" r="80" fill="#ec4899" style="animation: drift 7s ease-in-out infinite;"/>
  <circle cx="800" cy="180" r="100" fill="#fbbf24" style="animation: drift 8s ease-in-out 1s infinite;"/>
  
  <!-- Diagonal accent -->
  <line x1="0" y1="0" x2="100" y2="280" stroke="#06b6d4" stroke-width="2" opacity="0.1" style="animation: glow 6s ease-in-out infinite;"/>
  
  <!-- Name -->
  <text x="50" y="115" font-family="'Space Grotesk', sans-serif" font-size="80" font-weight="900" fill="#f1f5f9" letter-spacing="-2">
    <tspan class="c1">a</tspan><tspan class="c2">a</tspan><tspan class="c3">y</tspan><tspan class="c4">u</tspan><tspan class="c5">s</tspan><tspan class="c6">h</tspan>
  </text>
  
  <!-- Accent dot that pulses -->
  <circle cx="530" cy="95" r="4" fill="#ec4899" style="animation: pulse 2s ease-in-out 0.3s infinite;"/>
  
  <!-- Subtitle -->
  <text x="50" y="160" font-family="'Inter', sans-serif" font-size="12" font-weight="500" fill="#cbd5e1" letter-spacing="0.5" class="txt">
    Creative developer • Fullstack • Animation obsessed
  </text>
  
  <!-- Tech -->
  <text x="50" y="188" font-family="'JetBrains Mono', monospace" font-size="11" fill="#94a3b8" letter-spacing="0.2" class="txt">
    React • Node • Canvas • Figma • Design Systems
  </text>
  
  <!-- Status -->
  <g style="animation: charReveal 0.5s ease-out 0.6s both;">
    <circle cx="930" cy="250" r="5" fill="#84cc16" style="animation: pulse 1.5s ease-in-out infinite;"/>
    <text x="945" y="256" font-family="'Inter', sans-serif" font-size="10" font-weight="600" fill="#84cc16" letter-spacing="0.2">Actively building</text>
  </g>
</g>
</svg>