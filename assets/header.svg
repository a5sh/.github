<svg width="1000" height="300" viewBox="0 0 1000 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Header">
  <defs>
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c6af7" stop-opacity="0.28"/>
      <stop offset="50%" stop-color="#5a4fa5" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#2d2442" stop-opacity="0"/>
    </linearGradient>

    <radialGradient id="glowGrad" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#9d8ff5" stop-opacity="0.42"/>
      <stop offset="100%" stop-color="#7c6af7" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="accentGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c4b5fd" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#7c6af7" stop-opacity="0"/>
    </radialGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softGlow">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <clipPath id="clip">
      <rect width="1000" height="300" rx="20"/>
    </clipPath>
  </defs>

  <rect width="1000" height="300" rx="20" fill="#0c0c0f"/>
  <rect x="1" y="1" width="998" height="298" rx="19" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="2"/>

  <g clip-path="url(#clip)">
    <ellipse cx="200" cy="80" rx="200" ry="200" fill="url(#mainGrad)" filter="url(#softGlow)">
      <animate attributeName="opacity" values="0.2;0.5;0.2" dur="6s" repeatCount="indefinite"/>
    </ellipse>

    <ellipse cx="850" cy="250" rx="180" ry="180" fill="url(#glowGrad)" filter="url(#softGlow)">
      <animate attributeName="opacity" values="0.3;0.6;0.3" dur="7s" repeatCount="indefinite"/>
    </ellipse>

    <circle cx="500" cy="150" r="120" fill="url(#accentGlow)" opacity="0.4" filter="url(#softGlow)">
      <animate attributeName="r" values="120;140;120" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.5;0.3" dur="4s" repeatCount="indefinite"/>
    </circle>

    <path id="orbitPath1" d="M 40,0 A 40,40 0 1,1 -40,0 A 40,40 0 1,1 40,0" fill="none"/>
    <path id="orbitPath2" d="M 65,0 A 65,65 0 1,1 -65,0 A 65,65 0 1,1 65,0" fill="none"/>
    <path id="orbitPath3" d="M 85,0 A 85,85 0 1,1 -85,0 A 85,85 0 1,1 85,0" fill="none"/>

    <g transform="translate(500 150)">
      <circle cx="0" cy="0" r="3" fill="#9d8ff5" opacity="0.65" filter="url(#glow)">
        <animateMotion dur="8s" repeatCount="indefinite">
          <mpath href="#orbitPath1"/>
        </animateMotion>
      </circle>
      <circle cx="0" cy="0" r="2.5" fill="#c4b5fd" opacity="0.55">
        <animateMotion dur="10s" repeatCount="indefinite">
          <mpath href="#orbitPath2"/>
        </animateMotion>
      </circle>
      <circle cx="0" cy="0" r="2" fill="#7c6af7" opacity="0.75" filter="url(#glow)">
        <animateMotion dur="12s" repeatCount="indefinite">
          <mpath href="#orbitPath3"/>
        </animateMotion>
      </circle>
    </g>

    <g opacity="0.4">
      <circle cx="150" cy="80" r="2" fill="#9d8ff5">
        <animate attributeName="cy" values="80;60;80" dur="5s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.2;0.6;0.2" dur="5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="300" cy="200" r="1.5" fill="#c4b5fd">
        <animate attributeName="cy" values="200;170;200" dur="6s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.3;0.7;0.3" dur="6s" repeatCount="indefinite"/>
      </circle>
      <circle cx="750" cy="100" r="2.5" fill="#7c6af7">
        <animate attributeName="cy" values="100;70;100" dur="7s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.2;0.5;0.2" dur="7s" repeatCount="indefinite"/>
      </circle>
      <circle cx="850" cy="180" r="1" fill="#9d8ff5">
        <animate attributeName="cy" values="180;150;180" dur="8s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.4;0.8;0.4" dur="8s" repeatCount="indefinite"/>
      </circle>
    </g>

    <g opacity="0.14">
      <polygon points="500,50 550,80 500,110 450,80" fill="none" stroke="#9d8ff5" stroke-width="1.5">
        <animateTransform attributeName="transform" type="rotate" from="0 500 80" to="360 500 80" dur="15s" repeatCount="indefinite"/>
      </polygon>
      <polygon points="500,180 560,210 500,240 440,210" fill="none" stroke="#7c6af7" stroke-width="1.5">
        <animateTransform attributeName="transform" type="rotate" from="0 500 210" to="-360 500 210" dur="20s" repeatCount="indefinite"/>
      </polygon>
    </g>

    <g>
      <animateTransform attributeName="transform" type="translate" values="0 0;0 -2;0 0" dur="4s" repeatCount="indefinite"/>
      <text x="50" y="120" font-family="Fira Code, Courier New, monospace" font-size="56" font-weight="700" fill="#ededed" letter-spacing="-2">
        aayush<tspan font-size="32" fill="#9d8ff5" opacity="0.7">.</tspan>
      </text>
      <text x="50" y="160" font-family="Fira Code, monospace" font-size="14" fill="#7c6af7" letter-spacing="1" opacity="0.85">
        FULLSTACK ARCHITECT
      </text>
      <text x="50" y="210" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="12" fill="#4a4a5a" letter-spacing="0.5">
        JS • TS • React • Node • Python • MongoDB • UI/UX
      </text>
    </g>

    <g transform="translate(900 50)" opacity="0.6">
      <circle cx="0" cy="0" r="30" fill="none" stroke="#9d8ff5" stroke-opacity="0.9" stroke-width="1.5">
        <animate attributeName="r" values="30;50;30" dur="4s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.8;0.2;0.8" dur="4s" repeatCount="indefinite"/>
      </circle>
      <circle cx="0" cy="0" r="20" fill="none" stroke="#7c6af7" stroke-opacity="0.9" stroke-width="1">
        <animate attributeName="r" values="20;40;20" dur="3.5s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.6;0.1;0.6" dur="3.5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="0" cy="0" r="10" fill="#c4b5fd" opacity="0.4" filter="url(#glow)">
        <animate attributeName="r" values="10;15;10" dur="2s" repeatCount="indefinite"/>
      </circle>
    </g>

    <g transform="translate(750 250)">
      <text x="20" y="5" font-family="monospace" font-size="11" fill="#7c6af7" letter-spacing="0.5">
        BRAINSTORM. INNOVATE.
      </text>
    </g>
  </g>
</svg>