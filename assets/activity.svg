<svg width="1000" height="280" viewBox="0 0 1000 280" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="heatLow" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#272730" stop-opacity="0.6"/>
    <stop offset="100%" stop-color="#3a3a4a" stop-opacity="0.4"/>
  </linearGradient>
  
  <linearGradient id="heatMid" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#7c6af7" stop-opacity="0.5"/>
    <stop offset="100%" stop-color="#5a4fa5" stop-opacity="0.4"/>
  </linearGradient>
  
  <linearGradient id="heatHigh" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#9d8ff5" stop-opacity="0.8"/>
    <stop offset="100%" stop-color="#7c6af7" stop-opacity="0.6"/>
  </linearGradient>
  
  <filter id="heatGlow">
    <feGaussianBlur stdDeviation="1.5"/>
  </filter>
  
  <clipPath id="heatClip">
    <rect width="1000" height="280" rx="16"/>
  </clipPath>
  
  <style>
    @keyframes heatPulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }
    
    @keyframes heatFlash {
      0%, 100% { filter: drop-shadow(0 0 4px rgba(157, 143, 245, 0)); }
      50% { filter: drop-shadow(0 0 12px rgba(157, 143, 245, 0.8)); }
    }
    
    @keyframes slideInRight {
      0% { opacity: 0; transform: translateX(20px); }
      100% { opacity: 1; transform: translateX(0); }
    }
  </style>
</defs>

<!-- Background -->
<rect width="1000" height="280" rx="16" fill="#0c0c0f"/>
<rect width="998" height="278" x="1" y="1" rx="15" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="2"/>

<g clip-path="url(#heatClip)">
  <!-- Title -->
  <text x="50" y="45" font-family="'Fira Code', monospace" font-size="28" font-weight="700" fill="#ededed" letter-spacing="-1">
    Contribution Activity
  </text>
  
  <!-- Heatmap grid labels -->
  <text x="50" y="85" font-family="monospace" font-size="10" fill="#3a3a4a" font-weight="600" letter-spacing="0.5">
    Last 12 weeks
  </text>
  
  <!-- Day labels -->
  <text x="50" y="105" font-family="monospace" font-size="9" fill="#272730">Mon</text>
  <text x="50" y="135" font-family="monospace" font-size="9" fill="#272730">Wed</text>
  <text x="50" y="165" font-family="monospace" font-size="9" fill="#272730">Fri</text>
  <text x="50" y="195" font-family="monospace" font-size="9" fill="#272730">Sun</text>
  
  <!-- Activity heatmap (animated squares) -->
  <!-- Row 1: Low to High activity -->
  <g transform="translate(75, 90)">
    <!-- Week 1 -->
    <rect x="0" y="0" width="14" height="14" rx="3" fill="url(#heatLow)" stroke="rgba(255,255,255,0.1)" stroke-width="1" filter="url(#heatGlow)">
      <animate attributeName="opacity" values="0.4;0.8;0.4" dur="4s" repeatCount="indefinite"/>
    </rect>
    <rect x="0" y="16" width="14" height="14" rx="3" fill="url(#heatLow)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <rect x="0" y="32" width="14" height="14" rx="3" fill="url(#heatMid)" stroke="rgba(255,255,255,0.1)" stroke-width="1" filter="url(#heatGlow)">
      <animate attributeName="opacity" values="0.5;0.9;0.5" dur="4.5s" repeatCount="indefinite"/>
    </rect>
    <rect x="0" y="48" width="14" height="14" rx="3" fill="url(#heatLow)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    
    <!-- Week 2 -->
    <rect x="18" y="0" width="14" height="14" rx="3" fill="url(#heatMid)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <rect x="18" y="16" width="14" height="14" rx="3" fill="url(#heatHigh)" stroke="rgba(255,255,255,0.2)" stroke-width="1.5" filter="url(#heatGlow)">
      <animate attributeName="opacity" values="0.7;1;0.7" dur="3s" repeatCount="indefinite"/>
    </rect>
    <rect x="18" y="32" width="14" height="14" rx="3" fill="url(#heatMid)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <rect x="18" y="48" width="14" height="14" rx="3" fill="url(#heatLow)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    
    <!-- Week 3 -->
    <rect x="36" y="0" width="14" height="14" rx="3" fill="url(#heatHigh)" stroke="rgba(255,255,255,0.2)" stroke-width="1.5" filter="url(#heatGlow)">
      <animate attributeName="opacity" values="0.8;1;0.8" dur="2.8s" repeatCount="indefinite"/>
    </rect>
    <rect x="36" y="16" width="14" height="14" rx="3" fill="url(#heatMid)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <rect x="36" y="32" width="14" height="14" rx="3" fill="url(#heatHigh)" stroke="rgba(255,255,255,0.2)" stroke-width="1.5" filter="url(#heatGlow)">
      <animate attributeName="opacity" values="0.7;1;0.7" dur="3.2s" repeatCount="indefinite"/>
    </rect>
    <rect x="36" y="48" width="14" height="14" rx="3" fill="url(#heatMid)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    
    <!-- Week 4 -->
    <rect x="54" y="0" width="14" height="14" rx="3" fill="url(#heatLow)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <rect x="54" y="16" width="14" height="14" rx="3" fill="url(#heatHigh)" stroke="rgba(255,255,255,0.2)" stroke-width="1.5" filter="url(#heatGlow)">
      <animate attributeName="opacity" values="0.7;1;0.7" dur="3.1s" repeatCount="indefinite"/>
    </rect>
    <rect x="54" y="32" width="14" height="14" rx="3" fill="url(#heatMid)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <rect x="54" y="48" width="14" height="14" rx="3" fill="url(#heatLow)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    
    <!-- Week 5 -->
    <rect x="72" y="0" width="14" height="14" rx="3" fill="url(#heatMid)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <rect x="72" y="16" width="14" height="14" rx="3" fill="url(#heatMid)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <rect x="72" y="32" width="14" height="14" rx="3" fill="url(#heatHigh)" stroke="rgba(255,255,255,0.2)" stroke-width="1.5" filter="url(#heatGlow)">
      <animate attributeName="opacity" values="0.8;1;0.8" dur="3.3s" repeatCount="indefinite"/>
    </rect>
    <rect x="72" y="48" width="14" height="14" rx="3" fill="url(#heatMid)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    
    <!-- Week 6 -->
    <rect x="90" y="0" width="14" height="14" rx="3" fill="url(#heatHigh)" stroke="rgba(255,255,255,0.2)" stroke-width="1.5" filter="url(#heatGlow)">
      <animate attributeName="opacity" values="0.7;1;0.7" dur="2.9s" repeatCount="indefinite"/>
    </rect>
    <rect x="90" y="16" width="14" height="14" rx="3" fill="url(#heatLow)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <rect x="90" y="32" width="14" height="14" rx="3" fill="url(#heatMid)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <rect x="90" y="48" width="14" height="14" rx="3" fill="url(#heatHigh)" stroke="rgba(255,255,255,0.2)" stroke-width="1.5" filter="url(#heatGlow)">
      <animate attributeName="opacity" values="0.6;0.95;0.6" dur="3.4s" repeatCount="indefinite"/>
    </rect>
  </g>
  
  <!-- Legend -->
  <g transform="translate(500, 85)">
    <text x="0" y="0" font-family="monospace" font-size="10" fill="#3a3a4a" font-weight="600" letter-spacing="0.5">
      Intensity Legend:
    </text>
    
    <!-- Legend items -->
    <rect x="0" y="12" width="12" height="12" rx="2" fill="url(#heatLow)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <text x="18" y="21" font-family="monospace" font-size="9" fill="#272730">Low</text>
    
    <rect x="60" y="12" width="12" height="12" rx="2" fill="url(#heatMid)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <text x="76" y="21" font-family="monospace" font-size="9" fill="#272730">Medium</text>
    
    <rect x="160" y="12" width="12" height="12" rx="2" fill="url(#heatHigh)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <text x="176" y="21" font-family="monospace" font-size="9" fill="#272730">High</text>
  </g>
  
  <!-- Stats panel -->
  <g transform="translate(500, 120)">
    <rect width="450" height="130" rx="12" fill="rgba(124, 106, 247, 0.08)" stroke="rgba(124, 106, 247, 0.2)" stroke-width="1.5"/>
    
    <!-- Stat 1 -->
    <g transform="translate(20, 20)">
      <circle cx="0" cy="0" r="6" fill="#7c6af7" opacity="0.8"/>
      <text x="15" y="5" font-family="monospace" font-size="13" font-weight="600" fill="#9d8ff5">Consistent</text>
      <text x="15" y="20" font-family="monospace" font-size="11" fill="#4a4a5a">Active across all days</text>
    </g>
    
    <!-- Stat 2 -->
    <g transform="translate(20, 50)">
      <circle cx="0" cy="0" r="6" fill="#c4b5fd" opacity="0.8"/>
      <text x="15" y="5" font-family="monospace" font-size="13" font-weight="600" fill="#c4b5fd">Peak Hours</text>
      <text x="15" y="20" font-family="monospace" font-size="11" fill="#4a4a5a">Wed-Fri: Most commits</text>
    </g>
    
    <!-- Stat 3 -->
    <g transform="translate(230, 20)">
      <circle cx="0" cy="0" r="6" fill="#9d8ff5" opacity="0.8"/>
      <text x="15" y="5" font-family="monospace" font-size="13" font-weight="600" fill="#9d8ff5">Streaks</text>
      <text x="15" y="20" font-family="monospace" font-size="11" fill="#4a4a5a">Multiple 7+ day runs</text>
    </g>
    
    <!-- Stat 4 -->
    <g transform="translate(230, 50)">
      <circle cx="0" cy="0" r="6" fill="#7c6af7" opacity="0.8"/>
      <text x="15" y="5" font-family="monospace" font-size="13" font-weight="600" fill="#7c6af7">Commits</text>
      <text x="15" y="20" font-family="monospace" font-size="11" fill="#4a4a5a">Avg 8-12 per week</text>
    </g>
  </g>

</g>

</svg>