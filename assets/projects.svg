<svg width="1000" height="400" viewBox="0 0 1000 400" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Featured Projects">
  <defs>
    <linearGradient id="projectFlow1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9d8ff5" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#7c6af7" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#5a4fa5" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="projectFlow2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c4b5fd" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#7c6af7" stop-opacity="0.08"/>
    </linearGradient>

    <radialGradient id="projectPulse1" cx="40%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#9d8ff5" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#7c6af7" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="projectPulse2" cx="60%" cy="60%" r="55%">
      <stop offset="0%" stop-color="#7c6af7" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#5a4fa5" stop-opacity="0"/>
    </radialGradient>

    <filter id="projectSoftGlow">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="projectGlowSharp">
      <feGaussianBlur stdDeviation="2"/>
    </filter>

    <clipPath id="projectClip">
      <rect width="1000" height="400" rx="16"/>
    </clipPath>

    <style>
      @keyframes fadeInUp {
        0% { opacity: 0; transform: translateY(10px); }
        100% { opacity: 1; transform: translateY(0); }
      }
      
      @keyframes slideInLeft {
        0% { opacity: 0; transform: translateX(-15px); }
        100% { opacity: 1; transform: translateX(0); }
      }
      
      @keyframes slideInRight {
        0% { opacity: 0; transform: translateX(15px); }
        100% { opacity: 1; transform: translateX(0); }
      }
      
      @keyframes textReveal {
        0% { opacity: 0; }
        100% { opacity: 1; }
      }
      
      .title-main { animation: fadeInUp 0.8s ease-out 0.3s both; }
      .title-line { animation: slideInLeft 0.8s ease-out 0.5s both; }
      
      .card-1 { animation: slideInLeft 0.9s ease-out 0.6s both; }
      .card-2 { animation: slideInRight 0.9s ease-out 0.7s both; }
      
      .project-title { animation: fadeInUp 0.7s ease-out 0.8s both; }
      .project-desc-1 { animation: fadeInUp 0.7s ease-out 1s both; }
      .project-desc-2 { animation: fadeInUp 0.7s ease-out 1.1s both; }
      .project-tech { animation: fadeInUp 0.7s ease-out 1.2s both; }
      .project-link { animation: fadeInUp 0.7s ease-out 1.3s both; }
      
      .card-2-title { animation: fadeInUp 0.7s ease-out 0.95s both; }
      .card-2-desc-1 { animation: fadeInUp 0.7s ease-out 1.15s both; }
      .card-2-desc-2 { animation: fadeInUp 0.7s ease-out 1.25s both; }
      .card-2-tech { animation: fadeInUp 0.7s ease-out 1.35s both; }
      .card-2-link { animation: fadeInUp 0.7s ease-out 1.45s both; }
      
      .footer { animation: fadeInUp 0.7s ease-out 1.6s both; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1000" height="400" rx="16" fill="#0c0c0f"/>
  <rect x="1" y="1" width="998" height="398" rx="15" fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="2"/>

  <g clip-path="url(#projectClip)">
    <!-- Background gradient flows -->
    <ellipse cx="150" cy="100" rx="220" ry="160" fill="url(#projectFlow1)" filter="url(#projectSoftGlow)">
      <animate attributeName="opacity" values="0.25;0.5;0.25" dur="8s" repeatCount="indefinite"/>
    </ellipse>

    <ellipse cx="850" cy="300" rx="200" ry="150" fill="url(#projectFlow2)" filter="url(#projectSoftGlow)">
      <animate attributeName="opacity" values="0.2;0.45;0.2" dur="9s" repeatCount="indefinite"/>
    </ellipse>

    <!-- Pulsing orbs -->
    <circle cx="220" cy="120" r="90" fill="url(#projectPulse1)" filter="url(#projectSoftGlow)">
      <animate attributeName="r" values="90;130;90" dur="6.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.5;0.3" dur="6.5s" repeatCount="indefinite"/>
    </circle>

    <circle cx="780" cy="280" r="85" fill="url(#projectPulse2)" filter="url(#projectSoftGlow)">
      <animate attributeName="r" values="85;125;85" dur="7.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.25;0.45;0.25" dur="7.5s" repeatCount="indefinite"/>
    </circle>

    <!-- Particle system -->
    <g filter="url(#projectGlowSharp)" opacity="0.5">
      <circle cx="120" cy="90" r="1.5" fill="#9d8ff5">
        <animate attributeName="cy" values="90;55;90" dur="5s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.2;0.7;0.2" dur="5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="280" cy="200" r="1" fill="#c4b5fd">
        <animate attributeName="cy" values="200;155;200" dur="6s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.3;0.8;0.3" dur="6s" repeatCount="indefinite"/>
      </circle>
      <circle cx="720" cy="240" r="1.5" fill="#7c6af7">
        <animate attributeName="cy" values="240;200;240" dur="6.5s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.25;0.6;0.25" dur="6.5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="900" cy="320" r="1" fill="#9d8ff5">
        <animate attributeName="cy" values="320;280;320" dur="7s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.4;0.8;0.4" dur="7s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- Geometric accents -->
    <g opacity="0.12">
      <polygon points="180,50 210,95 150,95" fill="none" stroke="#9d8ff5" stroke-width="1.5">
        <animateTransform attributeName="transform" type="rotate" from="0 180 75" to="360 180 75" dur="8s" repeatCount="indefinite"/>
      </polygon>
      <circle cx="820" cy="320" r="50" fill="none" stroke="#c4b5fd" stroke-width="1" stroke-dasharray="8,4">
        <animate attributeName="stroke-dashoffset" values="0;12" dur="2s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- Title section -->
    <g>
      <text class="title-main" x="50" y="55" font-family="Fira Code, monospace" font-size="32" font-weight="700" fill="#ededed" letter-spacing="-1">
        Featured Projects
      </text>
      <line class="title-line" x1="50" y1="70" x2="280" y2="70" stroke="#7c6af7" stroke-width="3" opacity="0.7" stroke-linecap="round"/>
    </g>

    <!-- Project 1: POSTERIUM -->
    <g>
      <a href="https://posters.spicydevs.xyz/" target="_blank" rel="noopener noreferrer">
        <!-- Project card background -->
        <rect class="card-1" x="50" y="110" width="400" height="240" rx="12" fill="rgba(157, 143, 245, 0.08)" stroke="rgba(157, 143, 245, 0.2)" stroke-width="2"/>
        
        <!-- Accent line -->
        <line class="card-1" x1="50" y1="105" x2="450" y2="105" stroke="rgba(157, 143, 245, 0.3)" stroke-width="1.5" opacity="0.5">
          <animate attributeName="stroke-width" values="1.5;2.5;1.5" dur="3s" repeatCount="indefinite"/>
        </line>

        <!-- Project number/badge -->
        <circle class="card-1" cx="80" cy="140" r="18" fill="rgba(157, 143, 245, 0.2)" stroke="rgba(157, 143, 245, 0.4)" stroke-width="2"/>
        <text class="project-title" x="80" y="148" text-anchor="middle" font-family="Fira Code, monospace" font-size="16" font-weight="700" fill="#9d8ff5">01</text>

        <!-- Project title -->
        <text class="project-title" x="120" y="150" font-family="Fira Code, monospace" font-size="20" font-weight="700" fill="#9d8ff5">POSTERIUM</text>

        <!-- Project description -->
        <text class="project-desc-1" x="70" y="190" font-family="ui-monospace, monospace" font-size="12" fill="#4a4a5a">
          Beautiful poster generation platform
        </text>
        <text class="project-desc-2" x="70" y="210" font-family="ui-monospace, monospace" font-size="11" fill="#4a4a5a">
          Create stunning visual designs with ease.
        </text>

        <!-- Tech stack -->
        <text class="project-tech" x="70" y="235" font-family="monospace" font-size="10" fill="#272730">
          React • Canvas • Design • Animation
        </text>

        
        <!-- Link indicator -->
        <text class="project-link" x="70" y="325" font-family="monospace" font-size="10" fill="#7c6af7" letter-spacing="0.5">
          → posters.spicydevs.xyz
        </text>
      </a>
    </g>

    <!-- Project 2: SPICYDEVS -->
    <g>
      <a href="https://spicydevs.js.org/" target="_blank" rel="noopener noreferrer">
        <!-- Project card background -->
        <rect class="card-2" x="550" y="110" width="400" height="240" rx="12" fill="rgba(124, 106, 247, 0.08)" stroke="rgba(124, 106, 247, 0.2)" stroke-width="2"/>
        
        <!-- Accent line -->
        <line class="card-2" x1="550" y1="105" x2="950" y2="105" stroke="rgba(124, 106, 247, 0.3)" stroke-width="1.5" opacity="0.5">
          <animate attributeName="stroke-width" values="1.5;2.5;1.5" dur="3.2s" repeatCount="indefinite"/>
        </line>

        <!-- Project number/badge -->
        <circle class="card-2" cx="580" cy="140" r="18" fill="rgba(124, 106, 247, 0.2)" stroke="rgba(124, 106, 247, 0.4)" stroke-width="2"/>
        <text class="card-2-title" x="580" y="148" text-anchor="middle" font-family="Fira Code, monospace" font-size="16" font-weight="700" fill="#7c6af7">02</text>

        <!-- Project title -->
        <text class="card-2-title" x="620" y="150" font-family="Fira Code, monospace" font-size="20" font-weight="700" fill="#7c6af7">SPICYDEVS</text>

        <!-- Project description -->
        <text class="card-2-desc-1" x="570" y="190" font-family="ui-monospace, monospace" font-size="12" fill="#4a4a5a">
          Community-driven dev tools & resources
        </text>
        <text class="card-2-desc-2" x="570" y="210" font-family="ui-monospace, monospace" font-size="11" fill="#4a4a5a">
          Open-source projects for developers.
        </text>

        <!-- Tech stack -->
        <text class="card-2-tech" x="570" y="235" font-family="monospace" font-size="10" fill="#272730">
          JavaScript • Community • Open Source • Tools
        </text>

        
        <!-- Link indicator -->
        <text class="card-2-link" x="570" y="325" font-family="monospace" font-size="10" fill="#7c6af7" letter-spacing="0.5">
          → spicydevs.js.org
        </text>
      </a>
    </g>

    <!-- Divider line -->
    <line x1="50" y1="375" x2="950" y2="375" stroke="rgba(124, 106, 247, 0.1)" stroke-width="1"/>

    <!-- Footer note -->
    <text class="footer" x="50" y="395" font-family="monospace" font-size="9" fill="#272730" letter-spacing="0.5">
      Click projects to explore • More work available on GitHub
    </text>
  </g>
</svg>