<svg width="1000" height="400" viewBox="0 0 1000 400" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Featured Project">
  <defs>
    <linearGradient id="posteriumFlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c47c2e" stop-opacity="0.25"/>
      <stop offset="50%" stop-color="#d4a245" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#a85a20" stop-opacity="0"/>
    </linearGradient>

    <radialGradient id="posteriumPulse" cx="40%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#d4a245" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#c47c2e" stop-opacity="0"/>
    </radialGradient>

    <filter id="posteriumGlow">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="posteriumSharp">
      <feGaussianBlur stdDeviation="2"/>
    </filter>

    <clipPath id="posteriumClip">
      <rect width="1000" height="400" rx="16"/>
    </clipPath>

    <style>
      @keyframes fadeInUp {
        0% { opacity: 0; transform: translateY(10px); }
        100% { opacity: 1; transform: translateY(0); }
      }
      
      @keyframes slideInLeft {
        0% { opacity: 0; transform: translateX(-15px); }
        100% { opacity: 1; transform: translateX(0); }
      }
      
      .p-title { animation: fadeInUp 0.8s ease-out 0.3s both; }
      .p-line { animation: slideInLeft 0.8s ease-out 0.5s both; }
      .p-card { animation: slideInLeft 0.9s ease-out 0.6s both; }
      .p-badge { animation: fadeInUp 0.7s ease-out 0.8s both; }
      .p-heading { animation: fadeInUp 0.7s ease-out 0.95s both; }
      .p-desc-1 { animation: fadeInUp 0.7s ease-out 1.1s both; }
      .p-desc-2 { animation: fadeInUp 0.7s ease-out 1.2s both; }
      .p-features { animation: fadeInUp 0.7s ease-out 1.3s both; }
      .p-link { animation: fadeInUp 0.7s ease-out 1.45s both; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1000" height="400" rx="16" fill="#070706"/>
  <rect x="1" y="1" width="998" height="398" rx="15" fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="2"/>

  <g clip-path="url(#posteriumClip)">
    <!-- Background gradient flows -->
    <ellipse cx="150" cy="100" rx="240" ry="170" fill="url(#posteriumFlow)" filter="url(#posteriumGlow)">
      <animate attributeName="opacity" values="0.25;0.5;0.25" dur="8s" repeatCount="indefinite"/>
    </ellipse>

    <ellipse cx="850" cy="320" rx="220" ry="160" fill="url(#posteriumFlow)" filter="url(#posteriumGlow)">
      <animate attributeName="opacity" values="0.2;0.45;0.2" dur="9s" repeatCount="indefinite"/>
    </ellipse>

    <!-- Pulsing orbs -->
    <circle cx="240" cy="130" r="95" fill="url(#posteriumPulse)" filter="url(#posteriumGlow)">
      <animate attributeName="r" values="95;135;95" dur="6.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.5;0.3" dur="6.5s" repeatCount="indefinite"/>
    </circle>

    <circle cx="800" cy="300" r="90" fill="url(#posteriumPulse)" filter="url(#posteriumGlow)">
      <animate attributeName="r" values="90;130;90" dur="7.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.25;0.45;0.25" dur="7.5s" repeatCount="indefinite"/>
    </circle>

    <!-- Particle system -->
    <g filter="url(#posteriumSharp)" opacity="0.5">
      <circle cx="120" cy="90" r="1.5" fill="#d4a245">
        <animate attributeName="cy" values="90;55;90" dur="5s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.2;0.7;0.2" dur="5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="300" cy="200" r="1" fill="#c47c2e">
        <animate attributeName="cy" values="200;155;200" dur="6s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.3;0.8;0.3" dur="6s" repeatCount="indefinite"/>
      </circle>
      <circle cx="720" cy="250" r="1.5" fill="#d4a245">
        <animate attributeName="cy" values="250;200;250" dur="6.5s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.25;0.6;0.25" dur="6.5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="900" cy="330" r="1" fill="#c47c2e">
        <animate attributeName="cy" values="330;280;330" dur="7s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.4;0.8;0.4" dur="7s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- Geometric accents -->
    <g opacity="0.12">
      <polygon points="200,60 240,110 160,110" fill="none" stroke="#d4a245" stroke-width="1.5">
        <animateTransform attributeName="transform" type="rotate" from="0 200 90" to="360 200 90" dur="8s" repeatCount="indefinite"/>
      </polygon>
      <circle cx="820" cy="320" r="55" fill="none" stroke="#c47c2e" stroke-width="1" stroke-dasharray="8,4">
        <animate attributeName="stroke-dashoffset" values="0;12" dur="2s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- Title section -->
    <g>
      <text class="p-title" x="50" y="55" font-family="Bebas Neue, cursive" font-size="32" font-weight="700" fill="#f0e6cc" letter-spacing="-1">
        FEATURED PROJECT
      </text>
      <line class="p-line" x1="50" y1="70" x2="320" y2="70" stroke="#c47c2e" stroke-width="3" opacity="0.7" stroke-linecap="round"/>
    </g>

    <!-- Project card -->
    <g>
      <a href="https://posters.spicydevs.xyz/" target="_blank" rel="noopener noreferrer">
        <!-- Card background -->
        <rect class="p-card" x="50" y="110" width="900" height="260" rx="12" fill="rgba(196,124,46,0.08)" stroke="rgba(196,124,46,0.2)" stroke-width="2"/>
        
        <!-- Accent top line -->
        <line class="p-card" x1="50" y1="105" x2="950" y2="105" stroke="rgba(196,124,46,0.3)" stroke-width="1.5" opacity="0.5">
          <animate attributeName="stroke-width" values="1.5;2.5;1.5" dur="3s" repeatCount="indefinite"/>
        </line>

        <!-- Project badge -->
        <circle class="p-badge" cx="90" cy="150" r="20" fill="rgba(196,124,46,0.2)" stroke="rgba(196,124,46,0.4)" stroke-width="2"/>
        <text class="p-badge" x="90" y="158" text-anchor="middle" font-family="Bebas Neue, cursive" font-size="18" font-weight="700" fill="#d4a245">P</text>

        <!-- Project title -->
        <text class="p-heading" x="130" y="160" font-family="Bebas Neue, cursive" font-size="28" font-weight="700" fill="#d4a245" letter-spacing="0.04em">POSTERIUM</text>
        <text class="p-heading" x="130" y="185" font-family="Syne, sans-serif" font-size="13" fill="#b0a898" font-weight="600" letter-spacing="0.1em">FREE POSTER API WITH LIVE RATINGS</text>

        <!-- Description -->
        <text class="p-desc-1" x="130" y="220" font-family="DM Sans, sans-serif" font-size="13" fill="#e6dac4">
          Generate custom movie &amp; TV posters with glassmorphism rating badges
        </text>
        <text class="p-desc-2" x="130" y="240" font-family="DM Sans, sans-serif" font-size="13" fill="#e6dac4">
          from IMDb, Rotten Tomatoes, Metacritic, TMDB, Letterboxd, MAL &amp; more.
        </text>

        <!-- Features -->
        <g class="p-features">
          <text x="130" y="270" font-family="JetBrains Mono, monospace" font-size="11" fill="#c47c2e" font-weight="600" letter-spacing="0.05em">∞ Free API calls · No account · No rate limits · MIT License</text>
          <text x="130" y="290" font-family="JetBrains Mono, monospace" font-size="11" fill="#a85a20" letter-spacing="0.05em">SVG · PNG · JPG · WebP exports · Drag-drop builder · Plex ready</text>
        </g>

        <!-- Link indicator -->
        <text class="p-link" x="130" y="330" font-family="JetBrains Mono, monospace" font-size="11" fill="#d4a245" letter-spacing="0.05em">
          → posters.spicydevs.xyz
        </text>

        <!-- Right accent badge -->
        <g transform="translate(880, 150)">
          <circle cx="0" cy="0" r="8" fill="#c47c2e" opacity="0.8">
            <animate attributeName="r" values="8;11;8" dur="2s" repeatCount="indefinite"/>
          </circle>
          <circle cx="0" cy="0" r="14" fill="none" stroke="rgba(196,124,46,0.3)" stroke-width="1">
            <animate attributeName="r" values="14;18;14" dur="2s" repeatCount="indefinite"/>
            <animate attributeName="opacity" values="0.5;0.1;0.5" dur="2s" repeatCount="indefinite"/>
          </circle>
        </g>
      </a>
    </g>

    <!-- Footer divider -->
    <line x1="50" y1="390" x2="950" y2="390" stroke="rgba(196,124,46,0.1)" stroke-width="1"/>
  </g>
</svg>