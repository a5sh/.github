<svg width="1000" height="400" viewBox="0 0 1000 400" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="refPosterFlow" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#c47c2e" stop-opacity="0.25"/>
    <stop offset="50%" stop-color="#d4a245" stop-opacity="0.12"/>
    <stop offset="100%" stop-color="#a85a20" stop-opacity="0"/>
  </linearGradient>
  <radialGradient id="refPosterPulse" cx="40%" cy="40%" r="60%">
    <stop offset="0%" stop-color="#d4a245" stop-opacity="0.4"/>
    <stop offset="100%" stop-color="#c47c2e" stop-opacity="0"/>
  </radialGradient>
  <filter id="refPosterGlow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <clipPath id="refPosterClip"><rect width="1000" height="400" rx="16"/></clipPath>
  <style>@keyframes refCardSlide {0% {opacity:0;transform:translateX(-15px)} 100% {opacity:1;transform:translateX(0)}}</style>
</defs>
<rect width="1000" height="400" rx="16" fill="#070706"/>
<rect x="1" y="1" width="998" height="398" rx="15" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="2"/>
<g clip-path="url(#refPosterClip)">
  <ellipse cx="150" cy="100" rx="240" ry="170" fill="url(#refPosterFlow)" filter="url(#refPosterGlow)">
    <animate attributeName="opacity" values="0.25;0.5;0.25" dur="8s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="850" cy="320" rx="220" ry="160" fill="url(#refPosterFlow)" filter="url(#refPosterGlow)">
    <animate attributeName="opacity" values="0.2;0.45;0.2" dur="9s" repeatCount="indefinite"/>
  </ellipse>
  <circle cx="240" cy="130" r="95" fill="url(#refPosterPulse)" filter="url(#refPosterGlow)">
    <animate attributeName="r" values="95;135;95" dur="6.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0.5;0.3" dur="6.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="800" cy="300" r="90" fill="url(#refPosterPulse)" filter="url(#refPosterGlow)">
    <animate attributeName="r" values="90;130;90" dur="7.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.25;0.45;0.25" dur="7.5s" repeatCount="indefinite"/>
  </circle>
  <g style="animation: refCardSlide 0.8s ease-out;">
    <text x="50" y="55" font-family="'Space Mono', monospace" font-size="24" font-weight="700" fill="#f0e6cc" letter-spacing="-0.5px">Featured</text>
    <line x1="50" y1="70" x2="200" y2="70" stroke="#c47c2e" stroke-width="2" opacity="0.8" stroke-linecap="round"/>
  </g>
  <g style="animation: refCardSlide 0.8s ease-out 0.15s both;">
    <rect x="50" y="110" width="900" height="250" rx="12" fill="rgba(196,124,46,0.08)" stroke="rgba(196,124,46,0.2)" stroke-width="2"/>
    <text x="80" y="155" font-family="'Space Mono', monospace" font-size="26" font-weight="700" fill="#d4a245">Posterium</text>
    <text x="80" y="180" font-family="'Outfit', sans-serif" font-size="12" font-weight="600" fill="#b0a898" letter-spacing="0.5px">Rating overlay API for movie posters</text>
    <text x="80" y="205" font-family="'Outfit', sans-serif" font-size="11" font-weight="400" fill="#e6dac4" opacity="0.9">Generate custom posters with glassmorphic rating badges from IMDb, RT, TMDB, Letterboxd and more</text>
    <text x="80" y="235" font-family="'Space Mono', monospace" font-size="10" fill="#c47c2e">✓ Free API  ✓ No limits  ✓ MIT License  ✓ SVG, PNG, WebP</text>
    <text x="80" y="260" font-family="'Space Mono', monospace" font-size="9" fill="#a85a20" letter-spacing="0.3px">→ posters.spicydevs.xyz</text>
  </g>
</g>
</svg>